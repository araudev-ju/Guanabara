<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas Ol e Ul</title>
</head>
<body>
    <h1>Trabalhando com Listas</h1>
    <h2>Listas Ordenadas</h2>
    <ol>
        <li>Acordar</li>
        <li>Escovar os dentes</li>
        <li>Tomar Banho</li>
    </ol type="i"> <!--- 1 (padrao) A a I i -->
    <h2>Listas nao ordenadas </h2>
    <ul type="square"> <!--- square circle disc (padrao) -->
        <li>Acordar</li>
        <li>Tomar banho</li>
        <li>Pao, Leite, Tomate</li>
    </ul>
    <h2>Juntando listas</h2>
    <ol>
        <li>Antigas</li>
        <ol type="a">
            <li>Cobol</li>
            <li>Clipper</li>
        </ol>
        <li>Novas</li>
        <ol type="a">
            <li>Php</li>
            <li>Python</li>
            <li>Js</li>
        </ol>
    </ol>
</body>
</html>
